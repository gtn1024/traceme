version: 2

builds:
  - main: ./cmd/traceme
    binary: traceme
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: tarball
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    builds_info:
      group: binary
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - repository:
      owner: gtn1024
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/gtn1024/traceme"
    description: "Local activity logger: periodic screenshots → Vision LLM → JSONL"
    license: MIT
    install: |
      bin.install "traceme"
    test: |
      system "#{bin}/traceme", "version"

scoops:
  - repository:
      owner: gtn1024
      name: scoop-bucket
    token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    homepage: "https://github.com/gtn1024/traceme"
    description: "Local activity logger: periodic screenshots → Vision LLM → JSONL"
    license: MIT
