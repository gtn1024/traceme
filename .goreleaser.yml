version: 2

builds:
  - main: ./cmd/traceme
    binary: traceme
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: binary
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - repository:
      owner: gtn1024
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/gtn1024/traceme"
    description: "Local activity logger: periodic screenshots → Vision LLM → JSONL"
    license: MIT
    install: |
      bin.install "traceme"
    test: |
      system "#{bin}/traceme", "version"
